<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论坛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #FAFAFA;
            color: #262626;
             position: relative;
            min-height: 100vh;
        }

        /* 顶部导航栏 */
        .forum-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 54px;
            background: #FFFFFF;
            border-bottom: 1px solid #DBDBDB;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
        }

        .forum-title {
            font-size: 22px;
            font-weight: 400;
            color: #262626;
            font-family: 'Billabong', cursive, sans-serif;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #262626;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .back-btn:hover {
            opacity: 0.6;
        }

        .header-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #262626;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .header-btn:hover {
            opacity: 0.6;
        }

        .header-btn.spinning svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .settings-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #262626;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            padding: 8px;
            border-radius: 50%;
        }

        .settings-btn:hover {
            opacity: 0.6;
            transform: rotate(90deg);
        }

        .user-avatar-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .user-avatar-btn:hover {
            transform: scale(1.1);
            border-color: #FF6B6B;
        }

        /* 分类标签栏 */
        .category-tabs {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            background: #FFFFFF;
            border-bottom: 1px solid #DBDBDB;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 24px;
            z-index: 99;
            margin-top: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-item {
            padding: 8px 4px;
            font-size: 14px;
            font-weight: 500;
            color: #8E8E8E;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            user-select: none;
            border-bottom: 2px solid transparent;
        }

        .tab-item:hover {
            color: #262626;
        }

        .tab-item.active {
            color: #262626;
            font-weight: 600;
            border-bottom-color: #262626;
        }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #FFFFFF;
            border-top: 1px solid #DBDBDB;
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.2s;
            user-select: none;
            padding: 12px 0;
        }

        .nav-item:hover {
            opacity: 0.6;
        }

        .nav-item.active {
            color: #262626;
        }

        .nav-item:not(.active) {
            color: #8E8E8E;
        }

        .nav-icon {
            width: 24px;
            height: 24px;
        }

        /* 主内容区 */
        .forum-container {
            max-width: 600px;
            margin: 0 auto 70px;
            padding: 0;
        }

        /* 页面内容 */
        .page-content {
            display: none;
        }

        .page-content.active {
            display: block;
        }

        /* 左侧内容流 */
        .feed-section {
            flex: 1;
        }

        /* 发布框 */
        .compose-box {
            background: #FFFFFF;
            border: 1px solid #DBDBDB;
            padding: 16px;
            margin-bottom: 0;
        }

        .compose-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .compose-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .compose-input {
            flex: 1;
        }

        .compose-input textarea {
            width: 100%;
            min-height: 60px;
            border: none;
            outline: none;
            font-size: 14px;
            resize: none;
            font-family: inherit;
            color: #262626;
        }

        .compose-input textarea::placeholder {
            color: #8E8E8E;
        }

        .compose-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #EFEFEF;
        }

        .compose-tools {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .tool-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #262626;
            font-size: 20px;
            transition: opacity 0.2s;
        }

        .tool-btn:hover {
            opacity: 0.6;
        }

        .publish-btn {
            background: none;
            color: #353535;
            border: none;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .publish-btn:hover {
            background: rgba(0, 149, 246, 0.1);
        }

        .publish-btn:active {
            opacity: 0.6;
        }

        /* 动态卡片 */
        .post-card {
            background: #FFFFFF;
            border: 1px solid #DBDBDB;
            margin-bottom: 12px;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
        }

        .post-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }

        .post-avatar.pattern-dots {
            background-image: radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px);
            background-size: 6px 6px;
        }

        .post-avatar.pattern-stripes {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(255,255,255,0.2) 3px, rgba(255,255,255,0.2) 6px);
        }

        .post-avatar.pattern-grid {
            background-image: 
                linear-gradient(rgba(255,255,255,0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.2) 1px, transparent 1px);
            background-size: 6px 6px;
        }

        .post-avatar.pattern-diagonal {
            background-image: repeating-linear-gradient(-45deg, transparent, transparent 4px, rgba(255,255,255,0.15) 4px, rgba(255,255,255,0.15) 8px);
        }

        .post-info {
            flex: 1;
        }

        .post-author {
            font-size: 14px;
            font-weight: 600;
            color: #262626;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .vip-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border-radius: 50%;
            font-size: 10px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .post-meta {
            font-size: 12px;
            color: #8E8E8E;
        }

        .post-content {
            font-size: 14px;
            line-height: 1.5;
            color: #262626;
            padding: 0 16px 12px;
            word-wrap: break-word;
        }

        .post-actions {
            display: flex;
            gap: 16px;
            padding: 8px 16px 12px;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            color: #262626;
            font-size: 13px;
            transition: opacity 0.2s;
        }

        .action-btn:hover {
            opacity: 0.6;
        }

        .action-btn.liked {
            color: #ED4956;
        }

        .action-btn svg {
            width: 24px;
            height: 24px;
        }

        /* 音乐卡片 */
        .music-card {
            margin: 0 16px 12px;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .music-icon {
            font-size: 24px;
        }

        .music-info {
            flex: 1;
        }

        .music-title {
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .music-artist {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 2px;
        }

        .music-play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .music-play-btn:hover {
            transform: scale(1.1);
        }

        /* 投票卡片 */
        .poll-card {
            margin: 0 16px 12px;
            padding: 16px;
            background: #F5F5F5;
            border-radius: 8px;
        }

        .poll-question {
            font-size: 15px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 12px;
        }

        .poll-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .poll-option {
            padding: 10px 12px;
            background: white;
            border: 1px solid #DBDBDB;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .poll-option:hover {
            background: #F8F8F8;
            border-color: #667eea;
        }

        .poll-option-text {
            font-size: 14px;
            color: #262626;
        }

        .poll-votes {
            font-size: 13px;
            color: #8E8E8E;
        }

        .post-images {
            display: grid;
            gap: 2px;
            margin-bottom: 12px;
        }

        .post-images.single {
            grid-template-columns: 1fr;
        }

        .post-images.double {
            grid-template-columns: repeat(2, 1fr);
        }

        .post-images.triple {
            grid-template-columns: repeat(3, 1fr);
        }

        .post-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: #FAFAFA;
        }

        /* 右侧边栏 */
        .sidebar {
            width: 300px;
            position: sticky;
            top: 124px;
            height: fit-content;
        }

        .sidebar-card {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
        }

        .trending-item {
            padding: 12px 0;
            border-bottom: 1px solid #F0F0F0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .trending-item:last-child {
            border-bottom: none;
        }

        .trending-item:hover {
            background: #FAFAFA;
            margin: 0 -20px;
            padding-left: 20px;
            padding-right: 20px;
        }

        .trending-title {
            font-size: 14px;
            color: #333;
            margin-bottom: 4px;
        }

        .trending-meta {
            font-size: 12px;
            color: #999;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #F0F0F0;
        }

        .user-item:last-child {
            border-bottom: none;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .user-desc {
            font-size: 12px;
            color: #999;
        }

        .follow-btn {
            background: #FF6B6B;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .follow-btn:hover {
            background: #FF5252;
        }

        .follow-btn.following {
            background: #F0F0F0;
            color: #999;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-text {
            font-size: 16px;
        }

        /* 消息页面样式 */
        .message-item {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .message-item:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        .message-item.unread {
            background: #FFF8F8;
            border-left: 3px solid #FF6B6B;
        }

        .message-item.spam {
            opacity: 0.7;
        }

        .message-item.harassment {
            background: #FFF5F5;
        }

        .message-type-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .message-type-badge.spam {
            background: #FFE5E5;
            color: #FF6B6B;
        }

        .message-type-badge.harassment {
            background: #FFF0E5;
            color: #FF9800;
        }

        .message-type-badge.system {
            background: #E5F0FF;
            color: #2196F3;
        }

        .message-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 600;
            position: relative;
        }

        .unread-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 18px;
            height: 18px;
            background: #FF6B6B;
            border-radius: 50%;
            border: 2px solid #FFFFFF;
            font-size: 11px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .message-content {
            flex: 1;
            min-width: 0;
        }

        .message-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .message-text {
            font-size: 13px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .message-time {
            font-size: 12px;
            color: #999;
            white-space: nowrap;
        }

        /* 私信对话页面 */
        .chat-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #F5F5F5;
            z-index: 200;
            flex-direction: column;
        }

        .chat-container.active {
            display: flex;
        }

        .chat-header {
            height: 56px;
            background: #FFFFFF;
            border-bottom: 1px solid #E8E8E8;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
        }

        .chat-back-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }

        .chat-back-btn:hover {
            color: #FF6B6B;
        }

        .chat-user-info {
            flex: 1;
        }

        .chat-user-name {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .chat-user-status {
            font-size: 12px;
            color: #999;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .chat-message {
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
        }

        .chat-message.sent {
            flex-direction: row-reverse;
        }

        .chat-message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .chat-message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }

        .chat-message.received .chat-message-bubble {
            background: #FFFFFF;
            color: #333;
            border-top-left-radius: 4px;
        }

        .chat-message.sent .chat-message-bubble {
            background: #FF6B6B;
            color: white;
            border-top-right-radius: 4px;
        }

        .chat-input-area {
            background: #FFFFFF;
            border-top: 1px solid #E8E8E8;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            border: 1px solid #E8E8E8;
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: #FF6B6B;
        }

        .chat-send-btn {
            background: #333333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-send-btn:hover {
            background: #222222;
            transform: scale(1.05);
        }

        /* 设置弹窗 */
        .settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .settings-modal.active {
            display: flex;
        }

        .settings-content {
            background: white;
            width: 90%;
            max-width: 600px;
            border-radius: 16px;
            overflow: hidden;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid #E8E8E8;
        }

        .settings-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .settings-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .settings-close:hover {
            background: #F5F5F5;
            color: #333;
        }

        .settings-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .setting-section {
            margin-bottom: 24px;
        }

        .setting-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }

        .setting-hint {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .setting-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #E8E8E8;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .setting-input:focus {

            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;

            top: 2px;
            left: 2px;
            transition: transform 0.2s;

    <script>
        // 读取全局API配置
        const globalConfig = JSON.parse(localStorage.getItem('dundun22_globalApiConfig') || '{}');
        
        // 存储键名
        const FORUM_POSTS_KEY = 'forum_posts';
        const FORUM_MESSAGES_KEY = 'forum_messages';
        const FORUM_WORLD_SETTINGS_KEY = 'forum_world_settings';
        let currentCategory = 'all'; // 当前分类
        let currentChatUser = null; // 当前聊天对象

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 确保分类栏初始显示（首页）
            const categoryTabs = document.querySelector('.category-tabs');
            if (categoryTabs) {
                categoryTabs.style.display = 'flex';
            }
            
            loadPosts();
            loadMessages();
            // 模拟接收私信
            simulateReceiveMessage();
            // 加载用户资料
            updateProfileDisplay();
            
            // 监听来自父页面的消息（处理iframe顶栏按钮点击）
            window.addEventListener('message', function(event) {
                if (event.data && event.data.type === 'callIframeFunction') {
                    const funcName = event.data.funcName;
                    const args = event.data.args || [];
                    
                    console.log('[forum] 收到消息:', funcName, args);
                    
                    if (typeof window[funcName] === 'function') {
                        window[funcName].apply(null, args);
                        console.log('[forum] 已执行函数:', funcName);
                    } else {
                        console.warn('[forum] 函数不存在:', funcName);
                    }
                }
            });
        });

        // 切换页面
        window.switchPage = function(page, element) {
            // 更新导航样式
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');

            // 切换页面内容
            document.querySelectorAll('.page-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(page + '-page').classList.add('active');

            // 控制分类栏显示/隐藏（只在首页显示）
            const categoryTabs = document.querySelector('.category-tabs');
            if (categoryTabs) {
                if (page === 'home') {
                    categoryTabs.style.display = 'flex';
                } else {
                    categoryTabs.style.display = 'none';
                }
            }

            // 如果切换到我的主页，更新数据
            if (page === 'profile') {
                updateProfilePage();
            }
        }

        // 更新我的主页数据
        function updateProfilePage() {
            const posts = JSON.parse(localStorage.getItem(FORUM_POSTS_KEY) || '[]');
            const myPosts = posts.filter(p => p.author === '我');
            
            document.getElementById('profile-posts-count').textContent = myPosts.length;
            document.getElementById('profile-likes-count').textContent = myPosts.reduce((sum, p) => sum + (p.likes || 0), 0);
            document.getElementById('profile-comments-count').textContent = myPosts.reduce((sum, p) => sum + (p.comments || 0), 0);
            
            // 渲染我的动态列表
            const container = document.getElementById('my-posts-container');
            if (myPosts.length === 0) {
                container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><div class="empty-text">还没有发布动态</div></div>';
            } else {
                container.innerHTML = myPosts.map(post => createPostHTML(post)).join('');
            }
        }

        // 加载动态
        function loadPosts() {
            const posts = JSON.parse(localStorage.getItem(FORUM_POSTS_KEY) || '[]');
            renderPosts(posts);
        }

        // 切换分类
        function switchCategory(category, element) {
            currentCategory = category;
            
            // 更新标签样式
            document.querySelectorAll('.tab-item').forEach(tab => {
                tab.classList.remove('active');
            });
            element.classList.add('active');
            
            // 筛选并渲染动态
            const posts = JSON.parse(localStorage.getItem(FORUM_POSTS_KEY) || '[]');
            const filteredPosts = filterPostsByCategory(posts, category);
            renderPosts(filteredPosts);
        }

        // 根据分类筛选动态
        function filterPostsByCategory(posts, category) {
            if (category === 'all') {
                return posts;
            }
            
            const categoryKeywords = {
                'follow': [],
                'hot': [],
                'life': ['生活', '日常', '心情', '分享'],
                'food': ['美食', '吃', '餐厅', '烹饪', '菜谱'],
                'travel': ['旅行', '旅游', '风景', '度假', '打卡'],
                'tech': ['科技', '技术', '编程', 'AI', '数码']
            };
            
            if (category === 'follow') {
                return posts;
            }
            
            if (category === 'hot') {
                return [...posts].sort((a, b) => (b.likes || 0) - (a.likes || 0));
            }
            
            const keywords = categoryKeywords[category] || [];
            return posts.filter(post => {
                return keywords.some(keyword => post.content.includes(keyword));
            });
        }

        //  生成会员标志（根据用户名哈希值，30%概率显示）
        function generateVipBadge(userName) {
            // 根据用户名生成固定哈希值
            let hash = 0;
            for (let i = 0; i < userName.length; i++) {
                hash = userName.charCodeAt(i) + ((hash << 5) - hash);
            }
            
            // 30%的用户显示会员标志
            const isVip = Math.abs(hash) % 10 < 3;
            
            if (isVip) {
                return '<span class="vip-badge" title="认证会员">V</span>';
            }
            return '';
        }

        // 渲染动态列表
        function renderPosts(posts) {
            const container = document.getElementById('feed-container');
            
            if (posts.length === 0) {
                container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><div class="empty-text">还没有动态，快来发布第一条吧！</div></div>';
                return;
            }

            container.innerHTML = posts.map(post => createPostHTML(post)).join('');
        }

        // 创建动态HTML
        function createPostHTML(post) {
            const timeAgo = getTimeAgo(post.time);
            const likedClass = post.liked ? 'liked' : '';
            const likeIcon = post.liked ? 
                '<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>' :
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>';

            let imagesHTML = '';
            if (post.images && post.images.length > 0) {
                const gridClass = post.images.length === 1 ? 'single' : 
                                 post.images.length === 2 ? 'double' : 'triple';
                imagesHTML = '<div class="post-images ' + gridClass + '">';
                imagesHTML += post.images.map(function(img) {
                    return '<img src="' + img + '" class="post-image" alt="图片">';
                }).join('');
                imagesHTML += '</div>';
            }

            // 音乐分享卡片
            let musicHTML = '';
            if (post.music) {
                const parts = post.music.split(' - ');
                const songName = parts[0] || '';
                const artist = parts[1] || '';
                musicHTML = '<div class="music-card">' +
                    '<div class="music-icon">🎵</div>' +
                    '<div class="music-info">' +
                        '<div class="music-title">' + escapeHTML(songName) + '</div>' +
                        '<div class="music-artist">' + escapeHTML(artist) + '</div>' +
                    '</div>' +
                    '<button class="music-play-btn" onclick="window.musicPlaying=!window.musicPlaying;this.textContent=window.musicPlaying?\"⏸\":\"▶\"">▶</button>' +
                '</div>';
            }

            // 投票互动
            let pollHTML = '';
            if (post.poll) {
                const pollMatch = post.poll.match(/(.+?)\?(.+)/);
                if (pollMatch) {
                    const question = pollMatch[1];
                    const options = pollMatch[2].split('|');
                    const pollId = 'poll_' + post.id;
                    
                    pollHTML = '<div class="poll-card">' +
                        '<div class="poll-question">' + escapeHTML(question) + '？</div>' +
                        '<div class="poll-options">';
                    
                    options.forEach(function(option, index) {
                        const votes = Math.floor(Math.random() * 100) + 1;
                        pollHTML += '<div class="poll-option" onclick="votePoll(\'' + pollId + '\', ' + index + ')">' +
                            '<span class="poll-option-text">' + escapeHTML(option.trim()) + '</span>' +
                            '<span class="poll-votes" id="' + pollId + '_' + index + '">' + votes + '票</span>' +
                        '</div>';
                    });
                    
                    pollHTML += '</div></div>';
                }
            }

            // 获取用户资料，如果是"我"发布的，使用自定义头像
            let avatarContent = post.author[0];
            let avatarStyle = '';
            let avatarClass = 'post-avatar';
                        
            if (post.author === '我' || post.author === (JSON.parse(localStorage.getItem('dundun22_forum_user_profile') || '{}').name || '我')) {
                const profile = JSON.parse(localStorage.getItem('dundun22_forum_user_profile') || '{}');
                if (profile.avatar) {
                    avatarContent = '<img src="' + profile.avatar + '" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">';
                } else {
                    avatarContent = (profile.name || '我')[0];
                }
            } else if (post.avatar) {
                // 如果帖子有avatar字段（图片URL），直接使用
                avatarContent = '<img src="' + post.avatar + '" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">';
            } else {
                //  为虚拟用户生成随机真实头像（动漫/真人/动物等）
                const avatarStyles = [
                    'avataaars',      // 卡通人物
                    'bottts',         // 机器人
                    'lorelei',        // 动漫少女
                    'pixel-art',      // 像素风
                    'notionists',     // 简约人物
                    'adventurer',     // 冒险家
                    'fun-emoji'       // 表情
                ];
                
                // 根据用户名生成固定的头像风格（相同用户名始终相同）
                let hash = 0;
                for (let i = 0; i < post.author.length; i++) {
                    hash = post.author.charCodeAt(i) + ((hash << 5) - hash);
                }
                const styleIndex = Math.abs(hash) % avatarStyles.length;
                const style = avatarStyles[styleIndex];
                
                // 使用用户名作为seed，确保相同用户名始终生成相同头像
                const avatarUrl = `https://api.dicebear.com/7.x/${style}/svg?seed=${encodeURIComponent(post.author)}`;
                avatarContent = '<img src="' + avatarUrl + '" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">';
            }

            return '<div class="post-card">' +
                '<div class="post-header">' +
                    '<div class="' + avatarClass + '" style="' + avatarStyle + '">' + avatarContent + '</div>' +
                    '<div class="post-info">' +
                        '<div class="post-author">' + post.author + generateVipBadge(post.author) + '</div>' +
                        '<div class="post-meta">' + timeAgo + '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="post-content">' + escapeHTML(post.content) + '</div>' +

                        '<span>转发</span>' +
                    '</button>' +
                '</div>' +
            '</div>';
        }

        // 获取时间差
        function getTimeAgo(timestamp) {
            const now = Date.now();
            const diff = now - timestamp;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 0) return days + '天前';
            if (hours > 0) return hours + '小时前';
            if (minutes > 0) return minutes + '分钟前';
            return '刚刚';
        }

                '#E84393', '#0984E3', '#2D3436', '#636E72', '#B2BEC3'
            ];

            container.innerHTML = messages.map((msg, index) => {
                const unreadClass = msg.unread ? 'unread' : '';
                const typeClass = msg.type || '';
                const badgeHTML = msg.unreadCount > 0 ? '<div class="unread-badge">' + msg.unreadCount + '</div>' : '';

                    typeBadge = '<div class="message-type-badge system">系统</div>';
                }
                
                // 根据用户名生成固定的颜色索引
                let hash = 0;
                for (let i = 0; i < msg.userName.length; i++) {
                    hash = msg.userName.charCodeAt(i) + ((hash << 5) - hash);
                }
                
                //  为虚拟用户生成随机真实头像
                const avatarStyles = [
                    'avataaars',
                    'bottts',
                    'lorelei',
                    'pixel-art',
                    'notionists',
                    'adventurer',
                    'fun-emoji'
                ];
                const styleIndex = Math.abs(hash) % avatarStyles.length;
                const style = avatarStyles[styleIndex];
                const avatarUrl = `https://api.dicebear.com/7.x/${style}/svg?seed=${encodeURIComponent(msg.userName)}`;
                
                return '<div class="message-item ' + unreadClass + ' ' + typeClass + '" onclick="openChat(\'' + msg.userId + '\', \'' + msg.userName + '\')">' +
                    typeBadge +
                    '<div class="message-avatar"><img src="' + avatarUrl + '" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;"></div>' +
                    '<div class="message-content">' +
                        '<div class="message-title">' + msg.userName + generateVipBadge(msg.userName) + '</div>' +
                        '<div class="message-text">' + escapeHTML(msg.lastMessage) + '</div>' +
                    '</div>' +
                    '<div class="message-time">' + getTimeAgo(msg.time) + '</div>' +
                '</div>';
            }).join('');
        }

        // 加载聊天记录
        function loadChatHistory(userId) {
            const messages = JSON.parse(localStorage.getItem(FORUM_MESSAGES_KEY) || '[]');
            const chat = messages.find(m => m.userId === userId);
            
            const container = document.getElementById('chat-messages');
            if (!chat || !chat.history || chat.history.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-text">开始聊天吧</div></div>';
                return;
            }

            container.innerHTML = chat.history.map(msg => {
                const isSent = msg.sender === '我';
                const sentClass = isSent ? 'sent' : 'received';
                return '<div class="chat-message ' + sentClass + '">' +
                    '<div class="chat-message-avatar">' + (isSent ? '我' : chat.userName[0]) + '</div>' +
                    '<div class="chat-message-bubble">' + escapeHTML(msg.content) + '</div>' +
                '</div>';
            }).join('');

            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const content = input.value.trim();
            
            if (!content || !currentChatUser) return;

            const messages = JSON.parse(localStorage.getItem(FORUM_MESSAGES_KEY) || '[]');
            let chat = messages.find(m => m.userId === currentChatUser.userId);
            
            const newMessage = {
                sender: '我',
                content: content,
                time: Date.now()
            };

            if (!chat) {
                chat = {
                    userId: currentChatUser.userId,
                    userName: currentChatUser.userName,
                    lastMessage: content,
                    time: Date.now(),
                    unread: false,
                    unreadCount: 0,
                    history: []
                };
                messages.unshift(chat);
            } else {
                chat.lastMessage = content;
                chat.time = Date.now();
            }

            chat.history.push(newMessage);
            localStorage.setItem(FORUM_MESSAGES_KEY, JSON.stringify(messages));
            
            input.value = '';
            loadChatHistory(currentChatUser.userId);
            loadMessages();
        }
