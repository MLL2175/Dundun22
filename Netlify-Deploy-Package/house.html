<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我们的小屋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #FFFFFF;
            overflow-y: auto;
        }
        
        /* 房间展示区 */
        #house-room {
            position: relative;
            width: 100%;
            height: 400px;
            background: #f5f5f5;
            overflow: hidden;
        }
        
        #house-background {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transition: all 0.3s;
        }
        
        .room-furniture {
            position: absolute;
            cursor: grab;
            user-select: none;
            touch-action: none;
            transition: transform 0.1s;
            z-index: 10;
        }
        
        .room-furniture:active {
            transform: scale(1.1);
        }
        
        .room-furniture-icon {
            font-size: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .room-furniture-icon svg {
            width: 64px;
            height: 64px;
            image-rendering: pixelated;
        }
        
        .room-pet-name {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        /* 底部操作栏 */
        .bottom-actions {
            display: flex;
            justify-content: space-around;
            padding: 16px;
            background: #fff;
            border-top: 1px solid #eee;
        }
        
        .action-btn {
            flex: 1;
            max-width: 120px;
            padding: 12px;
            background: linear-gradient(135deg, #F8CCDB 0%, #FFB6C1 100%);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(248, 204, 219, 0.4);
        }
        
        .action-btn svg {
            width: 24px;
            height: 24px;
        }
        
        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            animation: fadeIn 0.3s;
        }
        
        .modal-overlay.active {
            display: flex;
            align-items: flex-end;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            width: 100%;
            max-height: 70vh;
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            animation: slideUp 0.3s;
            overflow-y: auto;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
            padding: 4px;
        }
        
        /* 商品列表 */
        .shop-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        
        .furniture-item {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .furniture-item:hover {
            background: #fff;
            border-color: #F8CCDB;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(248, 204, 219, 0.3);
        }
        
        .furniture-icon {
            font-size: 40px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 56px;
        }
        
        .furniture-icon svg {
            width: 48px;
            height: 48px;
            image-rendering: pixelated;
        }
        
        .furniture-name {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .furniture-price {
            font-size: 12px;
            color: #F8CCDB;
            font-weight: 600;
        }
        
        /* 宠物列表 */
        .pet-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .pet-item {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .pet-item:hover {
            background: #fff;
            border-color: #F8CCDB;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(248, 204, 219, 0.3);
        }
        
        .pet-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .pet-avatar {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .pet-avatar svg {
            width: 48px;
            height: 48px;
            image-rendering: pixelated;
        }
        
        .pet-details {
            flex: 1;
        }
        
        .pet-name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .pet-personality {
            font-size: 12px;
            color: #999;
        }
        
        .pet-price-tag {
            font-size: 14px;
            font-weight: 600;
            color: #F8CCDB;
        }
        
        /* 壁纸选择 */
        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .wallpaper-option {
            height: 120px;
            border-radius: 12px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
            position: relative;
        }
        
        .wallpaper-option:hover {
            transform: scale(1.05);
        }
        
        .wallpaper-option.selected {
            border-color: #F8CCDB;
            box-shadow: 0 0 0 2px #F8CCDB;
        }
        
        .wallpaper-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(255, 255, 255, 0.9);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            color: #333;
        }
    </style>
</head>

    </div>

        // 壁纸数据
        const wallpaperData = [
            { id: 'pink', name: '粉色温馨', color: '#FFE4E1' },
            { id: 'blue', name: '蓝色清新', color: '#E0F2F1' },
            { id: 'yellow', name: '黄色温暖', color: '#FFF9C4' },
            { id: 'green', name: '绿色自然', color: '#E8F5E9' },

        // 当前小屋数据
        let currentHouse = null;

        // 初始化
        function init() {
            loadHouse();
            renderRoom();
        }

        // 加载小屋数据
        function loadHouse() {
            const saved = localStorage.getItem('myHouse');
            if (saved) {
                currentHouse = JSON.parse(saved);
            } else {
                currentHouse = {
                    wallpaper: 'pink',
                    furniture: [],
                    pets: []
                };
                saveHouse();
            }
        }

        // 保存小屋数据
        function saveHouse() {
            localStorage.setItem('myHouse', JSON.stringify(currentHouse));
        }

        // 渲染房间
        function renderRoom() {
            // 设置背景
            const bg = document.getElementById('house-background');
            const wp = wallpaperData.find(w => w.id === currentHouse.wallpaper);
            if (wp) {
                bg.style.background = wp.color;
            }

            // 渲染家具和宠物
            const container = document.getElementById('room-furniture-container');
            container.innerHTML = '';

            // 渲染家具
            currentHouse.furniture.forEach((item, index) => {
                const furnitureInfo = furnitureData.find(f => f.id === item.id);
                if (furnitureInfo) {
                    const el = createFurnitureElement(furnitureInfo, index);
                    container.appendChild(el);
                }
            });

            // 渲染宠物
            currentHouse.pets.forEach((pet, index) => {
                const petInfo = petData.find(p => p.id === pet.id);
                if (petInfo) {
                    const el = createPetElement(petInfo, index);
                    container.appendChild(el);
                }
            });
            
            // 添加统一的拖拽事件监听（在容器上）
            setupDragListeners();
        }

        // 创建家具元素
        function createFurnitureElement(furniture, index) {
            const div = document.createElement('div');
            div.className = 'room-furniture';
            div.style.left = furniture.x + 'px';
            div.style.top = furniture.y + 'px';
            div.style.touchAction = 'none';
            div.style.pointerEvents = 'auto';
            div.innerHTML = `
                <div class="room-furniture-icon">${furniture.icon}</div>
            `;
            div.dataset.furnitureIndex = index;
            
            return div;
        }

        // 创建宠物元素
        function createPetElement(pet, index) {
            const div = document.createElement('div');
            div.className = 'room-furniture';
            div.style.left = pet.x + 'px';
            div.style.top = pet.y + 'px';
            div.style.touchAction = 'none';
            div.style.pointerEvents = 'auto';
            div.innerHTML = `
                <div class="room-furniture-icon">${pet.icon}</div>
                <div class="room-pet-name">${pet.name}</div>
            `;
            div.dataset.petIndex = index;
            
            return div;
        }

        // 打开家具商店
        function openShop() {
            const modal = document.getElementById('shop-modal');
            const list = document.getElementById('shop-list');
            
            // 只显示家具类型
            const furnitureItems = furnitureData.filter(item => item.type === 'furniture');
            
            list.innerHTML = furnitureItems.map(item => `
                <div class="furniture-item" onclick="buyFurniture('${item.id}')">
                    <div class="furniture-icon">${item.icon}</div>
                    <div class="furniture-name">${item.name}</div>
                    <div class="furniture-price">￥${item.price}</div>
                </div>
            `).join('');
            
            modal.classList.add('active');
        }

        // 打开宠物商店
        function openPetShop() {
            const modal = document.getElementById('pet-shop-modal');
            const list = document.getElementById('pet-shop-list');
            
            list.innerHTML = petData.map(pet => `
                <div class="pet-item" onclick="buyPet('${pet.id}')">
                    <div class="pet-info">
                        <div class="pet-avatar">${pet.icon}</div>
                        <div class="pet-details">
                            <div class="pet-name">${pet.name}</div>
                            <div class="pet-personality">${pet.personality || '可爱'}</div>
                        </div>
                        <div class="pet-price-tag">￥${pet.price}</div>
                    </div>

            modal.classList.add('active');
        }

        // 打开壁纸选择
        function openWallpaper() {
            const modal = document.getElementById('wallpaper-modal');
            const grid = document.getElementById('wallpaper-grid');
            
            grid.innerHTML = wallpaperData.map(wp => `
                <div class="wallpaper-option ${currentHouse.wallpaper === wp.id ? 'selected' : ''}" 
                     style="background: ${wp.color};"
                     onclick="selectWallpaper('${wp.id}')">
                    <div class="wallpaper-label">${wp.name}</div>
                </div>
            `).join('');
            
            modal.classList.add('active');
        }

        // 关闭弹窗
        function closeModal(event, modalId) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById(modalId).classList.remove('active');
        }

        // 购买家具
        function buyFurniture(furnitureId) {
            const furniture = furnitureData.find(f => f.id === furnitureId);
            if (!furniture) return;
            
            // 添加到房间 - 默认放在房间中央位置
            const roomWidth = document.getElementById('house-room').offsetWidth;
            const centerX = roomWidth / 2 - 32; // 居中，减去图标宽度的一半
            const centerY = 200 - 32; // 垂直居中
            
            currentHouse.furniture.push({
                id: furnitureId,
                x: centerX + (Math.random() - 0.5) * 100, // 在中心位置附近随机偏移
                y: centerY + (Math.random() - 0.5) * 100
            });
            
            saveHouse();
            renderRoom();
            closeModal(null, 'shop-modal');
            
            alert(`成功购买了 ${furniture.name}！`);
        }

        // 购买宠物
        function buyPet(petId) {
            const pet = petData.find(p => p.id === petId);
            if (!pet) return;
            
            // 添加到房间 - 默认放在房间中央位置
            const roomWidth = document.getElementById('house-room').offsetWidth;
            const centerX = roomWidth / 2 - 32; // 居中，减去图标宽度的一半
            const centerY = 200 - 32; // 垂直居中
            
            currentHouse.pets.push({
                id: petId,
                x: centerX + (Math.random() - 0.5) * 100, // 在中心位置附近随机偏移
                y: centerY + (Math.random() - 0.5) * 100
            });
            
            saveHouse();
            renderRoom();
            closeModal(null, 'pet-shop-modal');
            
            alert(`成功领养了 ${pet.name}！它会${pet.sound || '陪伴你'}～`);
        }

        // 选择壁纸
        function selectWallpaper(wallpaperId) {
            currentHouse.wallpaper = wallpaperId;
            saveHouse();
            renderRoom();
            closeModal(null, 'wallpaper-modal');
        }

        // 设置拖拽事件监听
        let dragTarget = null;
        let dragData = null;
        let dragStartX = 0;
        let dragStartY = 0;
        let dragInitialX = 0;
        let dragInitialY = 0;
        
        // 长按和双击检测
        let longPressTimer = null;
        let lastTapTime = 0;
        let isLongPress = false;
        let hasMoved = false; // 新增：记录是否发生了拖拽移动

        function setupDragListeners() {
            const room = document.getElementById('house-room');
            
            // 鼠标按下 / 触摸开始
            const handleStart = (e, clientX, clientY) => {
                const target = e.target.closest('.room-furniture');
                if (!target) return;
                
                // 检测双击
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTapTime;
                
                if (tapLength < 300 && tapLength > 0) {
                    // 双击 - 显示预览
                    e.preventDefault();
                    const furnitureIndex = target.dataset.furnitureIndex;
                    const petIndex = target.dataset.petIndex;
                    
                    if (furnitureIndex !== undefined) {
                        const furniture = currentHouse.furniture[parseInt(furnitureIndex)];
                        const furnitureInfo = furnitureData.find(f => f.id === furniture.id);
                        showPreview(furnitureInfo.name, furnitureInfo.icon, 'furniture');
                    } else if (petIndex !== undefined) {
                        const pet = currentHouse.pets[parseInt(petIndex)];
                        const petInfo = petData.find(p => p.id === pet.id);
                        showPreview(petInfo.name, petInfo.icon, 'pet', petInfo);
                    }
                    
                    lastTapTime = 0;
                    return;
                }
                
                lastTapTime = currentTime;
                
                // 重置移动状态
                hasMoved = false;
                
                // 设置长按定时器
                isLongPress = false;
                longPressTimer = setTimeout(() => {
                    if (!hasMoved) { // 只有没移动时才触发删除
                        isLongPress = true;
                        
                        const furnitureIndex = target.dataset.furnitureIndex;
                        const petIndex = target.dataset.petIndex;
                        
                        if (furnitureIndex !== undefined) {
                            const furniture = currentHouse.furniture[parseInt(furnitureIndex)];
                            const furnitureInfo = furnitureData.find(f => f.id === furniture.id);
                            showDeleteConfirm(furnitureInfo.name, 'furniture', parseInt(furnitureIndex));
                        } else if (petIndex !== undefined) {
                            const pet = currentHouse.pets[parseInt(petIndex)];
                            const petInfo = petData.find(p => p.id === pet.id);
                            showDeleteConfirm(petInfo.name, 'pet', parseInt(petIndex));
                        }
                    }
                }, 600); // 稍微缩短一点长按时间
                
                // 开始拖拽
                e.preventDefault();
                
                const furnitureIndex = target.dataset.furnitureIndex;
                const petIndex = target.dataset.petIndex;
                
                if (furnitureIndex !== undefined) {
                    dragTarget = target;
                    dragData = currentHouse.furniture[parseInt(furnitureIndex)];
                } else if (petIndex !== undefined) {
                    dragTarget = target;
                    dragData = currentHouse.pets[parseInt(petIndex)];
                }
                
                if (dragData) {
                    dragStartX = clientX;
                    dragStartY = clientY;
                    dragInitialX = dragData.x;
                    dragInitialY = dragData.y;
                    target.style.cursor = 'grabbing';
                }
            };
            
            // 鼠标按下
            room.addEventListener('mousedown', (e) => {
                handleStart(e, e.clientX, e.clientY);
            });
            
            // 触摸开始
            room.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                handleStart(e, touch.clientX, touch.clientY);
            }, { passive: false });
            
            // 鼠标移动 / 触摸移动
            const handleMove = (e, clientX, clientY) => {
                if (!dragTarget || !dragData) return;
                
                // 计算移动距离
                const moveDistance = Math.sqrt(
                    Math.pow(clientX - dragStartX, 2) + 
                    Math.pow(clientY - dragStartY, 2)
                );
                
                // 如果移动超过 5px，标记为已移动
                if (moveDistance > 5) {
                    hasMoved = true;
                    // 立即取消长按定时器
                    if (longPressTimer) {
                        clearTimeout(longPressTimer);
                        longPressTimer = null;
                    }
                }
                
                if (isLongPress) return; // 长按已触发，不再拖拽
                
                e.preventDefault();
                
                const dx = clientX - dragStartX;
                const dy = clientY - dragStartY;
                
                dragData.x = Math.max(0, Math.min(dragInitialX + dx, window.innerWidth - 64));
                dragData.y = Math.max(0, Math.min(dragInitialY + dy, 400 - 64));
                
                dragTarget.style.left = dragData.x + 'px';
                dragTarget.style.top = dragData.y + 'px';
            };
            
            // 鼠标移动
            document.addEventListener('mousemove', (e) => {
                handleMove(e, e.clientX, e.clientY);
            });
            
            // 触摸移动
            room.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                handleMove(e, touch.clientX, touch.clientY);
            }, { passive: false });
            
            // 鼠标释放 / 触摸结束
            const handleEnd = () => {
                if (longPressTimer) {
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                }
                
                if (dragTarget && !isLongPress) {
                    dragTarget.style.cursor = 'grab';
                    saveHouse();
                }
                
                dragTarget = null;
                dragData = null;
                isLongPress = false;
            };
            
            // 鼠标释放
            document.addEventListener('mouseup', handleEnd);
            
            // 触摸结束
            room.addEventListener('touchend', handleEnd);
        }
        
        // 显示删除确认框
        function showDeleteConfirm(name, type, index) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;

            `;
            
            modal.innerHTML = `

                    max-width: 300px;
                    width: 90%;
                    text-align: center;
                    animation: slideUp 0.3s;
                ">
                    <div style="font-size: 48px; margin-bottom: 16px;">${type === 'pet' ? '🐾' : ''}</div>
                    <div style="font-size: 18px; font-weight: 600; color: #333; margin-bottom: 8px;">确认删除</div>
                    <div style="font-size: 14px; color: #666; margin-bottom: 24px;">确定要删除 <strong style="color: #F8CCDB;">${name}</strong> 吗？</div>
                    <div style="display: flex; gap: 12px;">
                        <button onclick="this.closest('div').parentElement.parentElement.remove()" style="
                            flex: 1;
                            padding: 12px;
                            border: 2px solid #ddd;
                            background: white;
                            border-radius: 12px;
                            font-size: 15px;
                            font-weight: 600;
                            color: #666;
                            cursor: pointer;
                        ">取消</button>
                        <button id="confirm-delete-btn" style="
                            flex: 1;
                            padding: 12px;
                            border: none;
                            background: linear-gradient(135deg, #F8CCDB 0%, #FFB6C1 100%);
                            border-radius: 12px;
                            font-size: 15px;
                            font-weight: 600;
                            color: white;
                            cursor: pointer;
                        ">删除</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // 删除按钮事件
            document.getElementById('confirm-delete-btn').addEventListener('click', () => {
                if (type === 'furniture') {
                    currentHouse.furniture.splice(index, 1);
                } else {
                    currentHouse.pets.splice(index, 1);
                }
                saveHouse();
                renderRoom();
                modal.remove();
            });
            
            // 点击背景关闭
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.remove();
                }
            });
        }
        
        // 显示预览
        function showPreview(name, icon, type, petInfo) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 2000;
                animation: fadeIn 0.2s;
            `;
            
            let extraInfo = '';
            if (type === 'pet' && petInfo) {
                extraInfo = `
                    <div style="margin-top: 12px; padding: 12px; background: #f9f9f9; border-radius: 8px;">
                        <div style="font-size: 13px; color: #666; margin-bottom: 4px;">性格：${petInfo.personality || '可爱'}</div>
                        <div style="font-size: 13px; color: #666;">声音：${petInfo.sound || '-'}</div>
                    </div>
                `;
            }
            
            modal.innerHTML = `
                <div style="
                    background: white;
                    border-radius: 16px;
                    padding: 24px;
                    max-width: 280px;
                    width: 90%;
                    text-align: center;
                    animation: slideUp 0.3s;
                ">
                    <div style="font-size: 64px; margin-bottom: 16px; display: flex; justify-content: center; align-items: center; height: 80px;">${icon}</div>
                    <div style="font-size: 20px; font-weight: 600; color: #333; margin-bottom: 8px;">${name}</div>
                    <div style="font-size: 13px; color: #999; margin-bottom: 16px;">${type === 'pet' ? '宠物' : '家具'}</div>
                    ${extraInfo}
                    <button onclick="this.closest('div').parentElement.parentElement.remove()" style="
                        margin-top: 16px;
                        padding: 10px 32px;
                        border: none;
                        background: linear-gradient(135deg, #F8CCDB 0%, #FFB6C1 100%);
                        border-radius: 12px;
                        font-size: 15px;
                        font-weight: 600;
                        color: white;
                        cursor: pointer;
                    ">关闭</button>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // 点击背景关闭
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.remove();
                }
            });
        }

        // 页面加载时初始化
        window.addEventListener('load', () => {
            console.log(' 小屋应用已加载');
            init();
        });
    </script>
</body>
</html>
