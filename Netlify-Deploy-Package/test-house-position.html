<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试小屋图标位置</title>
</head>
<body>
    <h1>测试：小屋图标应该在查岗右边</h1>
    <p>请查看index.html中的布局顺序</p>
    <script>
        fetch('index.html')
            .then(r => r.text())
            .then(html => {
                const deviceCheck = html.indexOf('device-check');
                const house = html.indexOf('data-app-id="house"');
                const couple = html.indexOf('data-app-id="couple"');
                
                console.log('聊天:', html.indexOf('data-app-id="chat"'));
                console.log('情侣空间:', couple);
                console.log('查岗:', deviceCheck);
                console.log('小屋:', house);
                
                if (couple < deviceCheck && deviceCheck < house) {
                    document.body.innerHTML += '<p style="color:green">✓ 正确：情侣空间 → 查岗 → 小屋</p>';
                } else {
                    document.body.innerHTML += '<p style="color:red"> 错误：顺序不对</p>';
                }
            });
    </script>
</body>
</html>
